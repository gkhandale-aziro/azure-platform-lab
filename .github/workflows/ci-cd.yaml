name: Three-Tier CI/CD

on:
  workflow_dispatch:
    inputs:
      deploy_env:
        description: "Environment to deploy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: write       # allow GITHUB_TOKEN to push commits back to repo

env:
  ACR_LOGIN_SERVER: gskplatacrn73d5y.azurecr.io
  BACKEND_IMAGE: gskplatacrn73d5y.azurecr.io/three-tier/backend
  FRONTEND_IMAGE: gskplatacrn73d5y.azurecr.io/three-tier/frontend
  CHART_PATH: kubernetes/apps/three-tier

jobs:
  # ── CI checks (parallel) ──────────────────────────────────────────────────
  backend-ci:
    name: Backend tests + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json
      - name: Install
        working-directory: apps/backend
        run: npm ci --no-audit --no-fund
      - name: Test
        working-directory: apps/backend
        run: npm test
      - name: Lint
        working-directory: apps/backend
        run: npm run lint

  frontend-ci:
    name: Frontend tests + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Install
        working-directory: apps/frontend
        run: npm ci --no-audit --no-fund
      - name: Test
        working-directory: apps/frontend
        run: npm test
      - name: Lint
        working-directory: apps/frontend
        run: npm run lint

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Build & push images (parallel) ────────────────────────────────────────
  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    needs: [backend-ci, secret-scan]
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Set image tag
        id: tag
        run: echo "tag=build-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
      - name: Enable containerd image store
        run: |
          echo '{"features": {"containerd-snapshotter": true}}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_CLIENT_ID }}
          password: ${{ secrets.ACR_CLIENT_SECRET }}
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    needs: [frontend-ci, secret-scan]
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Set image tag
        id: tag
        run: echo "tag=build-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
      - name: Enable containerd image store
        run: |
          echo '{"features": {"containerd-snapshotter": true}}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_CLIENT_ID }}
          password: ${{ secrets.ACR_CLIENT_SECRET }}
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: apps/frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # ── Trivy scan (report-only) ──────────────────────────────────────────────
  trivy-scan:
    name: Trivy image scan
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    strategy:
      matrix:
        include:
          - image: backend
            ref: ${{ needs.build-backend.outputs.image_tag }}
          - image: frontend
            ref: ${{ needs.build-frontend.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_CLIENT_ID }}
          password: ${{ secrets.ACR_CLIENT_SECRET }}
      - name: Scan ${{ matrix.image }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/three-tier/${{ matrix.image }}:${{ matrix.ref }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          format: table
          output: trivy-${{ matrix.image }}.txt
          exit-code: "0"
      - name: Upload trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.image }}-report
          path: trivy-${{ matrix.image }}.txt
          if-no-files-found: warn

  # ── Update dev image tags in Git → ArgoCD picks up & syncs ────────────────
  update-dev-tags:
    name: Update dev image tags
    runs-on: ubuntu-latest
    needs: [trivy-scan]
    environment: dev
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update values-dev.yaml
        run: |
          BUILD_TAG="build-${{ github.run_number }}"
          VALUES_FILE=${{ env.CHART_PATH }}/values-dev.yaml

          python3 <<EOF
          import yaml
          with open("$VALUES_FILE") as f:
              vals = yaml.safe_load(f)
          vals.setdefault("frontend", {}).setdefault("image", {})
          vals["frontend"]["image"]["repository"] = "${{ env.FRONTEND_IMAGE }}"
          vals["frontend"]["image"]["tag"] = "$BUILD_TAG"
          vals["frontend"]["useConfigMapHTML"] = False
          vals.setdefault("backend", {}).setdefault("image", {})
          vals["backend"]["image"]["repository"] = "${{ env.BACKEND_IMAGE }}"
          vals["backend"]["image"]["tag"] = "$BUILD_TAG"
          vals["backend"]["useEchoArgs"] = False
          vals["backend"].setdefault("env", {})
          vals["backend"]["env"]["APP_ENV"] = "dev"
          vals["backend"]["env"]["APP_VERSION"] = "$BUILD_TAG"
          with open("$VALUES_FILE", "w") as f:
              yaml.safe_dump(vals, f, default_flow_style=False, sort_keys=False)
          EOF

          echo "=== Updated values-dev.yaml ==="
          cat $VALUES_FILE
      - name: Commit and push
        run: |
          BUILD_TAG="build-${{ github.run_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.CHART_PATH }}/values-dev.yaml
          git commit -m "ci(dev): bump images to ${BUILD_TAG}" || echo "no changes"
          git pull --rebase origin master
          git push origin master

  # ── Manual approval gate before prod ──────────────────────────────────────
  approve-prod:
    name: Approve prod deploy
    runs-on: ubuntu-latest
    needs: [update-dev-tags]
    environment: prod
    steps:
      - run: echo "Approved for prod"

  # ── Update prod image tags in Git → ArgoCD syncs to prod ──────────────────
  update-prod-tags:
    name: Update prod image tags
    runs-on: ubuntu-latest
    needs: [approve-prod]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update values-prod.yaml
        run: |
          BUILD_TAG="build-${{ github.run_number }}"
          VALUES_FILE=${{ env.CHART_PATH }}/values-prod.yaml

          python3 <<EOF
          import yaml
          with open("$VALUES_FILE") as f:
              vals = yaml.safe_load(f)
          vals.setdefault("frontend", {}).setdefault("image", {})
          vals["frontend"]["image"]["repository"] = "${{ env.FRONTEND_IMAGE }}"
          vals["frontend"]["image"]["tag"] = "$BUILD_TAG"
          vals["frontend"]["useConfigMapHTML"] = False
          vals.setdefault("backend", {}).setdefault("image", {})
          vals["backend"]["image"]["repository"] = "${{ env.BACKEND_IMAGE }}"
          vals["backend"]["image"]["tag"] = "$BUILD_TAG"
          vals["backend"]["useEchoArgs"] = False
          vals["backend"].setdefault("env", {})
          vals["backend"]["env"]["APP_ENV"] = "prod"
          vals["backend"]["env"]["APP_VERSION"] = "$BUILD_TAG"
          with open("$VALUES_FILE", "w") as f:
              yaml.safe_dump(vals, f, default_flow_style=False, sort_keys=False)
          EOF

          echo "=== Updated values-prod.yaml ==="
          cat $VALUES_FILE
      - name: Commit and push
        run: |
          BUILD_TAG="build-${{ github.run_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.CHART_PATH }}/values-prod.yaml
          git commit -m "ci(prod): bump images to ${BUILD_TAG}" || echo "no changes"
          git pull --rebase origin master
          git push origin master
