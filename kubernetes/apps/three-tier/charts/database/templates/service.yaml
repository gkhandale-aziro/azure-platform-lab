apiVersion: v1
kind: Service
metadata:
  name: database
  labels:
    app: database
spec:
  # Headless service — gives stable DNS for the StatefulSet pod (database-0.database.<ns>.svc.cluster.local)
  clusterIP: None
  selector:
    app: database
  ports:
    - name: postgres
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
