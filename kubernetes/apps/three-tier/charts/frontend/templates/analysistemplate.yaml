{{- if .Values.blueGreen.enabled }}
{{- if .Values.blueGreen.analysis.enabled }}
# AnalysisTemplate runs as prePromotionAnalysis. Argo Rollouts queries Prometheus
# AFTER green is up but BEFORE switching active Service.
#
# Two-stage gate:
#   1. min-traffic — green must receive >= 1 req/sec, else `success-rate` is meaningless
#                    (without this, `or vector(1)` falsely scores 100% with zero traffic)
#   2. success-rate — % of non-5xx responses on green must be >= 95%
#
# If either fails, the rollout auto-aborts; green is scaled down.
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: frontend-success-rate
spec:
  args:
    - name: service-name
  metrics:
    # ── Gate 1: minimum traffic ───────────────────────────────────────────
    # Forces the operator/automation to drive smoke-test traffic at the
    # preview Service before promotion. Prevents false-positive promotions
    # on zero traffic (which `or vector(1)` would otherwise allow).
    - name: min-traffic
      # Must see at least 1 request/sec over 1 minute window.
      # In production: tune this per service (low-traffic services need a
      # different gate; high-traffic services should require more).
      successCondition: result[0] >= 1
      failureLimit: 3
      interval: 30s
      count: 3
      provider:
        prometheus:
          address: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
          query: |
            sum(rate(istio_requests_total{
              reporter="destination",
              destination_service_name="{{`{{args.service-name}}`}}"
            }[1m]))
            or vector(0)

    # ── Gate 2: success rate ──────────────────────────────────────────────
    - name: success-rate
      successCondition: result[0] >= 0.95
      failureLimit: 3
      interval: 30s
      count: 3
      provider:
        prometheus:
          address: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
          query: |
            (
              sum(rate(istio_requests_total{
                reporter="destination",
                destination_service_name="{{`{{args.service-name}}`}}",
                response_code!~"5.."
              }[2m]))
              /
              sum(rate(istio_requests_total{
                reporter="destination",
                destination_service_name="{{`{{args.service-name}}`}}"
              }[2m]))
            )
            or vector(1)
{{- end }}
{{- end }}
