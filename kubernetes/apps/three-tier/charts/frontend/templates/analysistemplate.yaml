{{- if .Values.blueGreen.enabled }}
{{- if .Values.blueGreen.analysis.enabled }}
# AnalysisTemplate queries Prometheus for pod health metrics before promotion.
# Argo Rollouts runs this AFTER green is up but BEFORE switching active Service.
# If success rate < threshold, the rollout auto-aborts and green is scaled down.
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: frontend-success-rate
spec:
  args:
    - name: service-name
  metrics:
    - name: success-rate
      # Use `or vector(1)` so when there's no traffic yet, the query returns 1.0
      # (100% success) instead of an empty result, which crashes the analyzer.
      # In production you'd want a separate "min-traffic" check before this.
      successCondition: result[0] >= 0.95
      failureLimit: 3
      interval: 30s
      count: 3
      provider:
        prometheus:
          address: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
          query: |
            (
              sum(rate(istio_requests_total{
                reporter="destination",
                destination_service_name="{{`{{args.service-name}}`}}",
                response_code!~"5.."
              }[2m]))
              /
              sum(rate(istio_requests_total{
                reporter="destination",
                destination_service_name="{{`{{args.service-name}}`}}"
              }[2m]))
            )
            or vector(1)
{{- end }}
{{- end }}
