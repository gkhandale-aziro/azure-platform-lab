{{- if .Values.blueGreen.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: backend-preview
  labels:
    app: backend
    role: preview
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
{{- end }}
