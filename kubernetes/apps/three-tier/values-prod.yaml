frontend:
  image:
    repository: gskplatacrn73d5y.azurecr.io/three-tier/frontend
    tag: build-29
  replicaCount: 1
  greeting: Hello from PROD
  resources:
    requests:
      cpu: 30m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
  useConfigMapHTML: false
backend:
  image:
    repository: gskplatacrn73d5y.azurecr.io/three-tier/backend
    tag: build-29
  replicaCount: 1
  echoMessage: backend response from prod
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  useEchoArgs: false
  env:
    APP_ENV: prod
    APP_VERSION: build-29
database:
  image:
    repository: postgres
    tag: 15-alpine
  database: appdb
  username: appuser
  password: prod-superSecret-change-me
  storage:
    size: 1Gi
    storageClass: managed-csi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 512Mi
