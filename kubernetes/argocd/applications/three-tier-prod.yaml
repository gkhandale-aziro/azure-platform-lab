# ArgoCD Application — drift detection for the prod environment.
# Same drift-only model as three-tier-dev.yaml; different namespace + values file.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: three-tier-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/gkhandale-aziro/azure-platform-lab.git
    targetRevision: master
    path: kubernetes/apps/three-tier
    helm:
      valueFiles:
        - values-prod.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  # Auto-sync for prod kicks in only AFTER the manual approval gate in GitHub Actions
  # commits values-prod.yaml. ArgoCD then applies it.
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ApplyOutOfSyncOnly=true
