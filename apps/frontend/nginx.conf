# Runtime nginx config for the frontend container.
# Serves the React build from /usr/share/nginx/html and proxies /api/* to
# the backend Service. Backend lives in the same namespace, so the short DNS
# name `backend` resolves correctly via CoreDNS.

server {
    listen       80;
    server_name  _;

    # React SPA — serve index.html for any non-asset path.
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API — short-name DNS works because frontend and backend are in
    # the same Kubernetes namespace.
    location /api/ {
        proxy_pass http://backend:5678/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
